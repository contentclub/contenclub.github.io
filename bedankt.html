      <filter id="grainy-noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
        <feColorMatrix type="saturate" values="0" />
        <feComposite operator="in" in2="SourceGraphic" result="grain" />

    <div id="header-placeholder"></div>

        <div class="bg-milk border-black border-2 rounded-4xl p-8 md:p-16 shadow-xl text-center relative overflow-hidden">

            <p class="text-lg md:text-xl text-gray-700 leading-relaxed mb-10">

            </p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">

                id="home-button"
                class="px-6 py-3 border-2 border-black rounded-full bg-mint hover:bg-pink transition-all duration-200 font-bold shadow-md">

                <span id="timer">(6)</span>
              </a>
              <a
                href="https://instagram.com/contentclub.be"
                target="_blank"
